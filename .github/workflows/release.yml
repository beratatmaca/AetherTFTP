name: AetherTFTP Release Pipeline

on:
  workflow_call:

permissions:
  contents: write

jobs:
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      build: ${{ steps.v.outputs.build }}
      sha: ${{ steps.v.outputs.sha }}
      is_tag: ${{ steps.v.outputs.is_tag }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version
        id: v
        shell: bash
        run: |
          base=$(tr -d '[:space:]' < VERSION)
          build=$(git rev-list --count HEAD)
          sha=$(git rev-parse --short HEAD)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            is_tag=true
          else
            version="${base}.${build}"
            is_tag=false
          fi
          {
            echo "version=$version"
            echo "build=$build"
            echo "sha=$sha"
            echo "is_tag=$is_tag"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version (build $build, commit $sha)"

  build-and-release:
    name: Build and Package on ${{ matrix.os }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact-name: "AetherTFTP-Linux-Debian"
          - os: macos-latest
            artifact-name: "AetherTFTP-macOS-DMG"
          - os: windows-latest
            artifact-name: "AetherTFTP-Windows"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt 6 SDK
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.6.3"
          cache: false

      # Linux Setup & Compilation
      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev

      - name: Configure CMake (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake -G "Unix Makefiles" -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DBUILD_COVERAGE=OFF \
            -DAETHER_BUILD_NUMBER=${{ needs.version.outputs.build }} \
            -DAETHER_GIT_SHA=${{ needs.version.outputs.sha }}

      # macOS Setup & Compilation
      - name: Configure CMake (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cmake -G "Unix Makefiles" -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DBUILD_COVERAGE=OFF \
            -DAETHER_BUILD_NUMBER=${{ needs.version.outputs.build }} \
            -DAETHER_GIT_SHA=${{ needs.version.outputs.sha }}

      # Windows Setup & Compilation
      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DBUILD_COVERAGE=OFF -DAETHER_BUILD_NUMBER=${{ needs.version.outputs.build }} -DAETHER_GIT_SHA=${{ needs.version.outputs.sha }}

      - name: Compile Code (All Platforms)
        run: |
          cmake --build build --config Release -j2

      # Linux Packaging via CPack
      - name: Generate DEB Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd build
          cpack -G DEB

      # Windows Packaging via CPack + WiX
      - name: Generate MSI Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd build
          cpack -G WIX

      # Windows Packaging: portable (no-install) ZIP. Reuses the same
      # install() rules as the MSI — including the windeployqt step above —
      # so the archive is a self-contained, unzip-and-run folder.
      - name: Generate Portable ZIP (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd build
          cpack -G ZIP
          $zip = Get-ChildItem -Filter "*.zip" | Select-Object -First 1
          Rename-Item $zip.FullName "AetherTFTP-Windows-Portable.zip"

      # macOS Deployment and Packaging
      - name: Package app (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          macdeployqt build/aethertftp.app -dmg
          mv build/aethertftp.dmg build/AetherTFTP.dmg

      # Upload Build Artifacts to Workflow Run
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            build/*.deb
            build/*.dmg
            build/*.msi
            build/*.zip

  publish-release:
    name: Create GitHub Release
    needs: [version, build-and-release]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten Artifact Directory and Standardize Names
        env:
          IS_TAG: ${{ needs.version.outputs.is_tag }}
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.deb" -o -name "*.dmg" -o -name "*.msi" -o -name "*.zip" \) -exec cp {} release-files/ \;
          if [ "$IS_TAG" != "true" ]; then
            cd release-files
            for f in *.deb; do [ -f "$f" ] && mv "$f" AetherTFTP-latest-Linux.deb; done
            for f in *.msi; do [ -f "$f" ] && mv "$f" AetherTFTP-latest-Windows.msi; done
            for f in *.dmg; do [ -f "$f" ] && mv "$f" AetherTFTP-latest-macOS.dmg; done
            for f in *.zip; do [ -f "$f" ] && mv "$f" AetherTFTP-latest-Windows-Portable.zip; done
            cd ..
          fi
          ls -la release-files/

      - name: Clear Old Assets (Rolling Latest Only)
        if: needs.version.outputs.is_tag != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest &>/dev/null; then
            assets=$(gh release view latest --json assets -q '.assets[].name')
            for asset in $assets; do
              echo "Deleting old asset: $asset"
              gh release delete-asset latest "$asset" --yes || true
            done
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          tag_name: ${{ needs.version.outputs.is_tag == 'true' && github.ref_name || 'latest' }}
          name: ${{ needs.version.outputs.is_tag == 'true' && format('AetherTFTP v{0}', needs.version.outputs.version) || format('AetherTFTP v{0} (latest main)', needs.version.outputs.version) }}
          prerelease: ${{ needs.version.outputs.is_tag != 'true' }}
          make_latest: ${{ needs.version.outputs.is_tag == 'true' && 'true' || 'false' }}
          body: |
            Automated build of AetherTFTP.

            - **Version:** ${{ needs.version.outputs.version }}
            - **Build number:** ${{ needs.version.outputs.build }}
            - **Commit:** ${{ needs.version.outputs.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-snap:
    name: Build Snap Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Full history so override-pull's `git rev-list --count HEAD`
          # resolves the real build number instead of 1 (shallow clone).
          fetch-depth: 0

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: build

      - name: Upload Snap Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AetherTFTP-Linux-Snap
          path: ${{ steps.build.outputs.snap }}

  publish-snap:
    name: Publish to Snap Store
    needs: [version, build-snap]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Built Snap
        uses: actions/download-artifact@v4
        with:
          name: AetherTFTP-Linux-Snap
          path: .

      - name: Locate snap file
        id: snap
        # action-publish passes `snap:` straight to `snapcraft upload` and does
        # not expand globs, so resolve the concrete file name here.
        run: |
          file=$(ls -1 ./*.snap 2>/dev/null | head -n1)
          if [ -z "$file" ]; then
            echo "No .snap artifact found to publish." >&2
            exit 1
          fi
          echo "path=$file" >> "$GITHUB_OUTPUT"

      - name: Publish Snap
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snap.outputs.path }}
          release: ${{ needs.version.outputs.is_tag == 'true' && 'stable' || 'edge' }}
