name: AetherTFTP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Formatting gate — fast, blocking.
  # ---------------------------------------------------------------------------
  format:
    name: Formatting (clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y clang-format cmake qt6-base-dev
      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=OFF
      - name: Check formatting
        run: cmake --build build --target format-check

  # ---------------------------------------------------------------------------
  # Sanitizers — ASan+UBSan is a blocking gate (verified clean). TSan is
  # advisory (continue-on-error) until validated green on the CI runner.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: Sanitizer (${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer: address+undefined
            blocking: true
          - sanitizer: thread
            blocking: false
    continue-on-error: ${{ !matrix.blocking }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt6 + toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake g++ qt6-base-dev
      # ThreadSanitizer needs reduced ASLR entropy on recent kernels, otherwise
      # it aborts with "unexpected memory mapping".
      - name: Reduce ASLR entropy (TSan)
        if: matrix.sanitizer == 'thread'
        run: sudo sysctl -w vm.mmap_rnd_bits=28
      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          -DAETHER_SANITIZER=${{ matrix.sanitizer }}
      - name: Build tests
        run: cmake --build build --target tftp_test -j$(nproc)
      - name: Run tests under sanitizer
        env:
          # QT_NO_GLIB makes Qt use its poll-based dispatcher instead of the
          # GLib one, so our code paths no longer traverse libglib — which makes
          # the third-party suppressions safe (they cannot mask our own races).
          QT_NO_GLIB: "1"
          QT_QPA_PLATFORM: offscreen
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          TSAN_OPTIONS: suppressions=${{ github.workspace }}/.tsan-suppressions.txt:halt_on_error=1:second_deadlock_stack=1
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # Coverage — blocking; uploads to Codecov.
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++ qt6-base-dev lcov
      - name: Configure (coverage)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_COVERAGE=ON
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure
      - name: Capture coverage
        run: |
          lcov --capture --directory build --output-file coverage.info \
               --ignore-errors mismatch,gcov,source
          lcov --remove coverage.info '/usr/*' '*/build/*' '*/tests/*' \
               '*_autogen/*' --output-file coverage.info
          lcov --list coverage.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
