name: AetherTFTP CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

# ---------------------------------------------------------------------------
# Cancel any in-progress run for the same branch/PR so we don't waste minutes.
# ---------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Formatting ────────────────────────────────────────────────────────────
  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y clang-format cmake qt6-base-dev qt6-l10n-tools qt6-tools-dev
      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=OFF
      - name: Check formatting
        run: cmake --build build --target format-check

  # ─── Documentation ─────────────────────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake qt6-base-dev qt6-l10n-tools qt6-tools-dev doxygen graphviz
      - name: Configure CMake
        run: cmake -S . -B build -DBUILD_TESTING=OFF
      - name: Generate Documentation
        run: cmake --build build --target docs

  # ─── Static Analysis ───────────────────────────────────────────────────────
  lint:
    name: Static Analysis
    needs: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y cmake g++ qt6-base-dev qt6-l10n-tools qt6-tools-dev clang-tidy libsystemd-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Run clang-tidy
        run: cmake --build build --target tidy

  # ─── Unit Tests (Linux, sanitizer matrix) ─────────────────────────────────
  unit-tests:
    name: Unit Tests (${{ matrix.sanitizer }})
    needs: format
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - none
          - address+undefined
          - thread

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt 6 SDK
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.6.3"
          cache: false

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libgl1-mesa-dev cmake g++ \
            qt6-base-dev qt6-l10n-tools qt6-tools-dev tftp-hpa tftpd-hpa libsystemd-dev

      - name: Configure CMake
        env:
          SANITIZER: ${{ matrix.sanitizer }}
        run: |
          EXTRA_FLAGS=""
          if [ "$SANITIZER" != "none" ]; then
            EXTRA_FLAGS="-DAETHER_SANITIZER=${SANITIZER}"
          fi
          cmake -G "Unix Makefiles" -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            $EXTRA_FLAGS

      - name: Compile Code
        run: cmake --build build --config Debug -j$(nproc)

      - name: Run Unit Tests
        env:
          QT_QPA_PLATFORM: offscreen
          # ASAN/LSAN — disable leak detection (false positives from Qt internals)
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          # TSAN — suppress known Qt false positives
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1:suppressions=${{ github.workspace }}/.tsan_suppressions
        run: ctest --test-dir build --output-on-failure -C Debug

      # in.tftpd needs root; re-run just that test as root via passwordless sudo (-E preserves env vars).
      - name: Run tftp-hpa server-direction interop test (root)
        env:
          QT_QPA_PLATFORM: offscreen
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1:suppressions=${{ github.workspace }}/.tsan_suppressions
        run: sudo -E ./build/tftp_test testCliInteropWithTftpHpa

  # ─── Regression: window-size negotiation (dedicated slot) ─────────────────
  regression-window:
    name: Regression — window size negotiation
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ qt6-base-dev qt6-l10n-tools qt6-tools-dev tftp-hpa libsystemd-dev
      - name: Configure
        run: |
          cmake -G "Unix Makefiles" -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Run window size regression test (10 iterations)
        env:
          QT_QPA_PLATFORM: offscreen
        # Repeat 10× to expose any non-deterministic race conditions.
        run: |
          for i in $(seq 1 10); do
            echo "=== Iteration $i ==="
            ./build/tftp_test testWindowSizeNegotiation
          done

  # ─── Windows Native Build ──────────────────────────────────────────────────
  windows-build:
    name: Windows Build
    needs: format
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6 SDK
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.6.3"
          cache: true

      - name: Configure (Windows)
        shell: pwsh
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DAETHER_USE_SYSTEMD=OFF

      - name: Compile (Windows)
        shell: pwsh
        run: |
          cmake --build build --config Release

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: aethertftp-windows-x86_64
          path: build/Release/aethertftp.exe
          retention-days: 14

  # ─── Coverage ─────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    needs: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++ qt6-base-dev qt6-l10n-tools qt6-tools-dev lcov tftp-hpa libsystemd-dev
      - name: Configure (coverage)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_COVERAGE=ON
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: ./build/tftp_test -o -,txt -o junit.xml,junitxml
      - name: Capture coverage
        run: |
          lcov --capture --directory build --output-file coverage.info \
               --ignore-errors mismatch,gcov,source
          lcov --remove coverage.info '/usr/*' '*/build/*' '*/tests/*' \
               '*_autogen/*' --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─── Release Pipeline ──────────────────────────────────────────────────────
  release:
    name: Release
    needs: [format, docs, lint, unit-tests, regression-window, windows-build, coverage]
    uses: ./.github/workflows/release.yml
    secrets: inherit
