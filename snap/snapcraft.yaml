name: aethertftp
title: AetherTFTP
base: core24
adopt-info: aethertftp
icon: snap/gui/icon.png
summary: High-performance TFTP client & server with a sleek GUI and headless CLI
description: |
  AetherTFTP is a modern, lightweight, open-source TFTP (Trivial File Transfer Protocol) client and server application designed for speed, reliability, and ease of use. Engineered in C++17 and powered by the Qt 6 framework, it is the ultimate tool for system administrators, network engineers, and developers looking to transfer files, upgrade router/switch firmware, or set up PXE boot environments.

  Key Features:
  - **Sleek GUI & Headless CLI**: Automatically launches as a graphical application or shifts into a zero-dependency CLI mode based on arguments.
  - **Blazing Fast Speeds**: Supports custom block sizes (RFC 2348) up to 65464 bytes and window size options for maximum network throughput.
  - **RFC Standards Compliant**: Full implementation of RFC 1350 (Core TFTP), RFC 2347 (Option Extension), RFC 2348 (Blocksize Option), and RFC 2349 (Timeout & Transfer Size Options).
  - **Integrated Server**: Spin up a local TFTP server with customizable root directories, ports, and real-time transaction logging.
  - **Active Transfer Monitoring**: Track multi-file progress, transfer rates, and connection status via the built-in dashboard and active queue viewer.

  Perfect for: firmware updates, router/switch recovery, network configuration backups, and PXE boot setups.
license: MIT
contact: https://github.com/beratatmaca/AetherTFTP/issues
issues: https://github.com/beratatmaca/AetherTFTP/issues
website: https://github.com/beratatmaca/AetherTFTP
source-code: https://github.com/beratatmaca/AetherTFTP

grade: stable
confinement: strict

layout:
  /usr/lib/x86_64-linux-gnu/libproxy:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/libproxy

apps:
  aethertftp:
    command: usr/local/bin/aethertftp
    plugs:
      - network
      - network-bind

parts:
  aethertftp:
    plugin: cmake
    source: .
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
    build-packages:
      - build-essential
      - qt6-base-dev
      - libgl1-mesa-dev
      - git
    stage-packages:
      - libqt6core6
      - libqt6network6
      - libqt6gui6t64
      - libqt6widgets6t64
      - libgl1
      - libegl1
      - libopengl0
      - libfontconfig1
      - libgraphite2-3
      - libharfbuzz0b
      - libmd4c0
      - libproxy1v5
    override-pull: |
      craftctl default
      base=$(tr -d '[:space:]' < VERSION)
      build=$(git rev-list --count HEAD)
      craftctl set version="${base}.${build}"
